general {
    hide_cursor = false
    grace = 0
    no_fade_in = true
}

background {
    path = ~/.config/hypr/images/wallpaper1.jpg
    color = rgba(17, 17, 27, 0.35)
    blur_passes = 2
    blur_size = 5
    noise = 0.0115
}

label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    position = 120, 180
    halign = left
    valign = center
    font_size = 110
    font_family = JetBrainsMono Nerd Font
    color = rgb(205, 214, 244)
    shadow_passes = 4
    shadow_size = 14
    shadow_color = rgba(137, 180, 250, 0.35)
}


label {
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    position = 130, 50
    halign = left
    valign = center
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = rgba(186, 194, 222, 0.85)
}

label {
    text = cmd[update:30000] bash -c 'BAT=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); STATUS=$(cat /sys/class/power_supply/BAT*/status 2>/dev/null | head -1); if [ -z "$BAT" ]; then echo "  N/A"; elif [ "$STATUS" = "Charging" ]; then echo "  $BAT% ⚡"; elif [ "$BAT" -lt 20 ]; then echo "  $BAT% "; else echo "  $BAT% "; fi'
    position = -120, 180
    halign = right
    valign = center
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = rgb(166, 227, 161)
    shadow_passes = 2
    shadow_size = 4
}

label {
    text = cmd[update:60000] echo " $(uptime -p | sed 's/up //') uptime"
    position = -120, 130
    halign = right
    valign = center
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    color = rgb(137, 180, 250)
}

label {
    text = cmd[update:30000] bash -c "free -h | awk '/^Mem:/ {printf \"  %s / %s\", \$3, \$2}'"
    position = -120, 80
    halign = right
    valign = center
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    color = rgb(203, 166, 247)
}

label {
    text = cmd[update:300000] bash -c "df -h / | awk 'NR==2 {printf \"  %s free', \$4}'"
    position = -120, 30
    halign = right
    valign = center
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    color = rgb(137, 220, 235)
}

label {
    text = cmd[update:1000] ~/.local/bin/keyboard-layout.sh
    position = 0, -50
    halign = center
    valign = center
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    color = rgba(186, 194, 222, 0.7)
}

input-field {
    size = 400, 70
    position = 0, -120
    halign = center
    valign = center

    outer_color = rgb(137, 180, 250)
    inner_color = rgba(30, 30, 46, 0.9)
    font_color = rgb(205, 214, 244)

    fade_on_empty = false
    check_color = rgb(166, 227, 161)
    fail_color = rgb(243, 139, 168)
    capslock_color = rgb(249, 226, 175)

    placeholder_text = <span foreground="##6c7086">  unlock...</span>
    font_family = JetBrainsMono Nerd Font
    font_size = 20

    rounding = 15
    border_size = 2

    shadow_passes = 4
    shadow_size = 2
    shadow_boost = 1.5
    shadow_color = rgba(137, 180, 250, 0.3)
}

label {
    text = "⏎ enter    ·    esc cancel    ·    caps"
    position = 0, -200
    halign = center
    valign = center
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    color = rgba(108, 112, 133, 0.6)
}

label {
    text = cmd[update:3600000] echo "$(whoami)@$(hostname)"
    position = 0, -280
    halign = center
    valign = center
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    color = rgba(186, 194, 222, 0.7)
}
